<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国篮球运动员信息库</title>
    <style>
        :root {
            /* 基础色彩 */
            --bg-gradient: linear-gradient(135deg, #0a0c10 0%, #141820 100%);
            --card-bg: rgba(26, 29, 36, 0.85);
            --header-bg: rgba(10, 12, 16, 0.7);
            --primary-color: #FF6B35;
            --primary-hover: #ff8558;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);

            /* 位置标签颜色 */
            --color-c: #E63946;
            /* 中锋 */
            --color-pf: #F77F00;
            /* 大前锋 */
            --color-sf: #FCBF49;
            /* 小前锋 */
            --color-sg: #2A9D8F;
            /* 得分后卫 */
            --color-pg: #00AFB9;
            /* 控球后卫 */

            /* 交互 */
            --transition: all 0.2s ease;
            --glass-blur: blur(12px);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-top: 80px;
            /* 为吸顶标题留位 */
            overflow-x: hidden;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0c10;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        /* --- 顶部标题栏 --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--header-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary-color);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }

        .site-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .player-count-header {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .count-num {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .count-unit {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* --- 主容器 --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- 统计卡片条 --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .pos-distribution {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 5px;
        }

        .pos-dot-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* --- 搜索与筛选栏 --- */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrapper {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(255, 107, 53, 0.2);
        }

        .select-filter {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            outline: none;
            cursor: pointer;
            min-width: 150px;
        }

        .btn-add {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-left: auto;
        }

        .btn-add:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* --- 结果提示与视图切换 --- */
        .results-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .results-count {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .view-toggle {
            display: none;
            /* 仅在移动端可见或作为备选 */
        }

        /* --- 表格设计 (桌面端) --- */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: #1e2128;
        }

        th {
            padding: 16px 20px;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            position: relative;
        }

        th::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: var(--primary-color);
            opacity: 0.8;
        }

        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
            cursor: pointer;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: rgba(255, 107, 53, 0.08);
            position: relative;
        }

        tbody tr:hover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--primary-color);
        }

        td {
            padding: 16px 20px;
            vertical-align: middle;
            font-size: 0.95rem;
        }

        /* 单元格内容样式 */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
        }

        .player-name {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .player-id {
            font-family: 'Courier New', Courier, monospace;
            opacity: 0.7;
            font-size: 0.85rem;
        }

        .type-tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            display: inline-block;
        }

        .trend-icon {
            margin-left: 5px;
            font-size: 0.8rem;
        }

        .trend-up {
            color: #E63946;
        }

        .trend-down {
            color: #00AFB9;
        }

        .trend-stable {
            color: var(--text-muted);
        }

        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-ghost:hover {
            background: var(--primary-color);
            color: white;
        }

        .btn-delete {
            border-color: #EF4444;
            color: #EF4444;
        }

        .btn-delete:hover {
            background: #EF4444;
            color: white;
        }

        /* --- 移动端卡片视图 --- */
        .cards-container {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .player-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .card-title-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .card-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-label {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .card-actions .btn-ghost {
            flex: 1;
            text-align: center;
        }

        /* --- 模态框 --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #1a1d24;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 40px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition);
        }

        .close-modal:hover {
            opacity: 1;
        }

        .modal-section {
            margin-bottom: 30px;
        }

        .modal-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
            padding-left: 12px;
        }

        .modal-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-block label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .info-block span {
            font-size: 1rem;
            font-weight: 500;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            header {
                padding: 0 15px;
            }

            .site-title {
                font-size: 1rem;
            }

            .table-container {
                display: none;
            }

            .cards-container {
                display: flex;
            }

            .view-toggle {
                display: block;
                margin-left: 10px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 25px;
            }
        }

        /* 桌面端特有：视图切换按钮 */
        .desktop-view-toggle {
            display: flex;
            background: var(--card-bg);
            border-radius: 8px;
            padding: 4px;
            border: 1px solid var(--border-color);
        }

        .toggle-btn {
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .toggle-btn.active {
            background: var(--primary-color);
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon"></div>
            <h1 class="site-title">中国篮球运动员信息库</h1>
        </div>
        <div class="player-count-header">
            <span class="count-num" id="totalCountHeader">0</span>
            <span class="count-unit">名球员</span>
        </div>
    </header>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📊 球员总数</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📍 位置分布</div>
                <div class="pos-distribution" id="posDistribution">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🎂 平均年龄</div>
                <div class="stat-value" id="avgAge">0.0</div>
            </div>
        </div>

        <!-- 搜索与筛选 -->
        <div class="filter-bar">
            <div class="search-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索姓名/身份证号/单位…">
            </div>
            <select class="select-filter" id="typeFilter">
                <option value="all">所有位置</option>
                <option value="中锋">中锋 (C)</option>
                <option value="大前锋">大前锋 (PF)</option>
                <option value="小前锋">小前锋 (SF)</option>
                <option value="得分后卫">得分后卫 (SG)</option>
                <option value="控球后卫">控球后卫 (PG)</option>
            </select>
            <div class="desktop-view-toggle" id="viewToggleGroup">
                <div class="toggle-btn active" data-view="table">表格</div>
                <div class="toggle-btn" data-view="card">卡片</div>
            </div>
            <button type="button" class="btn-add" id="btnAddPlayer" onclick="openAddModal()">+ 新增球员</button>
        </div>

        <div class="results-meta">
            <div class="results-count" id="resultsCount">结果：0条</div>
        </div>

        <!-- 列表容器 -->
        <div class="table-container" id="tableView">
            <table>
                <thead>
                    <tr>
                        <th>头像</th>
                        <th>姓名</th>
                        <th>身份证号</th>
                        <th>类型</th>
                        <th>单位</th>
                        <th>民族</th>
                        <th>出生地</th>
                        <th>年龄</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="playerTableBody">
                    <!-- 动态注入 -->
                </tbody>
            </table>
        </div>

        <div class="cards-container" id="cardView">
            <!-- 动态注入 -->
        </div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>

            <div class="modal-section">
                <div class="modal-section-title">基础信息</div>
                <div class="modal-info-grid">
                    <div class="info-block"><label>姓名</label><span id="m-name"></span></div>
                    <div class="info-block"><label>类型</label><span id="m-type"></span></div>
                    <div class="info-block"><label>身份证号</label><span id="m-id"></span></div>
                    <div class="info-block"><label>单位</label><span id="m-unit"></span></div>
                    <div class="info-block"><label>民族</label><span id="m-ethnicity"></span></div>
                    <div class="info-block"><label>出生地</label><span id="m-birth"></span></div>
                    <div class="info-block"><label>年龄</label><span id="m-age"></span></div>
                </div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">身体数据</div>
                <div class="modal-info-grid">
                    <div class="info-block"><label>身高 (cm)</label><span id="m-height"></span></div>
                    <div class="info-block"><label>体重 (kg)</label><span id="m-weight"></span></div>
                    <div class="info-block"><label>鞋码 (EUR)</label><span id="m-shoe"></span></div>
                    <div class="info-block"><label>衣服尺码</label><span id="m-cloth"></span></div>
                </div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">家庭与证件</div>
                <div class="modal-info-grid">
                    <div class="info-block"><label>父亲姓名</label><span id="m-father"></span></div>
                    <div class="info-block"><label>母亲姓名</label><span id="m-mother"></span></div>
                    <div class="info-block"><label>婚姻状况</label><span id="m-marital"></span></div>
                    <div class="info-block"><label>护照号</label><span id="m-passport"></span></div>
                    <div class="info-block"><label>有效期</label><span id="m-passport-exp"></span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑球员模态框 -->
    <div class="modal-overlay" id="formModalOverlay">
        <div class="modal-content">
            <button class="close-modal" id="closeFormModal">&times;</button>
            <h2 id="formModalTitle" style="margin-bottom: 25px; color: var(--primary-color);">新增球员</h2>

            <form id="playerForm">
                <input type="hidden" id="f-id">

                <div class="modal-section">
                    <div class="modal-section-title">基础信息</div>
                    <div class="modal-info-grid">
                        <div class="info-block">
                            <label>姓名</label>
                            <input type="text" id="f-name" required class="search-input">
                        </div>
                        <div class="info-block">
                            <label>位置类型</label>
                            <select id="f-type" required class="select-filter" style="width: 100%;">
                                <option value="中锋">中锋 (C)</option>
                                <option value="大前锋">大前锋 (PF)</option>
                                <option value="小前锋">小前锋 (SF)</option>
                                <option value="得分后卫">得分后卫 (SG)</option>
                                <option value="控球后卫">控球后卫 (PG)</option>
                            </select>
                        </div>
                        <div class="info-block">
                            <label>身份证号</label>
                            <input type="text" id="f-idCard" required class="search-input">
                        </div>
                        <div class="info-block">
                            <label>单位</label>
                            <input type="text" id="f-unit" required class="search-input">
                        </div>
                        <div class="info-block">
                            <label>民族</label>
                            <input type="text" id="f-ethnicity" required class="search-input">
                        </div>
                        <div class="info-block">
                            <label>出生地</label>
                            <input type="text" id="f-birth" required class="search-input">
                        </div>
                        <div class="info-block">
                            <label>年龄</label>
                            <input type="number" id="f-age" required class="search-input">
                        </div>
                    </div>
                </div>

                <div class="modal-section">
                    <div class="modal-section-title">身体数据</div>
                    <div class="modal-info-grid">
                        <div class="info-block">
                            <label>身高 (cm)</label>
                            <input type="number" id="f-height" required class="search-input">
                        </div>
                        <div class="info-block">
                            <label>体重 (kg)</label>
                            <input type="number" id="f-weight" required class="search-input">
                        </div>
                        <div class="info-block">
                            <label>鞋码 (EUR)</label>
                            <input type="number" id="f-shoe" required class="search-input">
                        </div>
                        <div class="info-block">
                            <label>衣服尺码</label>
                            <input type="text" id="f-cloth" required class="search-input">
                        </div>
                    </div>
                </div>

                <div class="modal-section">
                    <div class="modal-section-title">家庭与证件</div>
                    <div class="modal-info-grid">
                        <div class="info-block">
                            <label>父亲姓名</label>
                            <input type="text" id="f-father" class="search-input">
                        </div>
                        <div class="info-block">
                            <label>母亲姓名</label>
                            <input type="text" id="f-mother" class="search-input">
                        </div>
                        <div class="info-block">
                            <label>婚姻状况</label>
                            <select id="f-marital" class="select-filter" style="width: 100%;">
                                <option value="未婚">未婚</option>
                                <option value="已婚">已婚</option>
                                <option value="离异">离异</option>
                            </select>
                        </div>
                        <div class="info-block">
                            <label>护照号</label>
                            <input type="text" id="f-passport" class="search-input">
                        </div>
                        <div class="info-block">
                            <label>有效期</label>
                            <input type="date" id="f-passport-exp" class="search-input" style="color-scheme: dark;">
                        </div>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
                    <button type="button" class="btn-ghost" id="cancelForm" style="padding: 10px 30px;">取消</button>
                    <button type="submit" class="btn-add" style="margin: 0; padding: 10px 40px;">保存球员</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. 数据模拟
        const playersData = [
            {
                id: '1',
                name: '易建联',

            },
            {

                idCard: '65010019960520XXXX',
                position: '大前锋',
                unit: '新疆伊力王酒',
                ethnicity: '维吾尔族',
                birthplace: '新疆阿勒泰',
                age: 27,
                trend: 'stable',
                height: 203,
                weight: 95,
                shoeSize: 47,
                clothSize: 'XXL',
                family: { father: '阿不都某某', mother: '某某', maritalStatus: '已婚' },
                certificates: { passportNo: 'E2233XXXX', expiryDate: '2029-08-08' }
            }
        ];

        // 2. 配置与变量
        const posColors = {
            '中锋': 'var(--color-c)',
            '大前锋': 'var(--color-pf)',
            '小前锋': 'var(--color-sf)',
            '得分后卫': 'var(--color-sg)',
            '控球后卫': 'var(--color-pg)'
        };

        let filteredPlayers = [...playersData];
        let currentView = 'table';

        // 3. DOM 元素
        const tableBody = document.getElementById('playerTableBody');
        const cardView = document.getElementById('cardView');
        const searchInput = document.getElementById('searchInput');
        const typeFilter = document.getElementById('typeFilter');
        const resultsCount = document.getElementById('resultsCount');
        const totalCountHeader = document.getElementById('totalCountHeader');
        const statTotal = document.getElementById('statTotal');
        const posDistribution = document.getElementById('posDistribution');
        const avgAge = document.getElementById('avgAge');
        const modal = document.getElementById('modalOverlay');
        const closeModal = document.getElementById('closeModal');
        const viewToggleBtns = document.querySelectorAll('.toggle-btn');

        // 4. 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            render();

            // 搜索过滤 (防抖处理)
            searchInput.addEventListener('input', debounce(() => {
                handleFilter();
            }, 300));

            // 下拉过滤
            typeFilter.addEventListener('change', handleFilter);

            // 视图切换
            viewToggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    viewToggleBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentView = btn.dataset.view;
                    switchView();
                });
            });

            // 新增球员按钮逻辑已转移至 inline onclick

            // 表单模态框控制
            const formModal = document.getElementById('formModalOverlay');
            const closeFormBtn = document.getElementById('closeFormModal');
            const cancelFormBtn = document.getElementById('cancelForm');
            const playerForm = document.getElementById('playerForm');

            const hideFormModal = () => formModal.classList.remove('active');
            closeFormBtn.addEventListener('click', hideFormModal);
            cancelFormBtn.addEventListener('click', hideFormModal);
            window.addEventListener('click', (e) => {
                if (e.target === formModal) hideFormModal();
            });

            playerForm.addEventListener('submit', handleFormSubmit);

            // 关闭详情模态框
            closeModal.addEventListener('click', () => modal.classList.remove('active'));
            window.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });

            // 监听窗口大小自动切换视图（可选）
            window.addEventListener('resize', () => {
                if (window.innerWidth < 768 && currentView === 'table') {
                    // 移动端自动显示卡片，但UI上可能不改变选中状态以保持用户逻辑
                }
            });
        });

        // 5. 核心功能函数
        function render() {
            renderTable();
            renderCards();
            resultsCount.textContent = `结果：${filteredPlayers.length}条`;
        }

        function renderTable() {
            tableBody.innerHTML = filteredPlayers.map(p => `
                <tr onclick="showDetails('${p.id}')">
                    <td>
                        <div class="avatar" style="background: ${posColors[p.position]}">
                            ${p.name.charAt(0)}
                        </div>
                    </td>
                    <td><div class="player-name">${p.name}</div></td>
                    <td><div class="player-id">${p.idCard}</div></td>
                    <td><span class="type-tag" style="background: ${posColors[p.position]}">${p.position}</span></td>
                    <td>${p.unit}</td>
                    <td>${p.ethnicity}</td>
                    <td>${p.birthplace}</td>
                    <td>
                        ${p.age}
                        <span class="trend-icon ${getTrendClass(p.trend)}">${getTrendSymbol(p.trend)}</span>
                    </td>
                    <td>
                        <div class="action-btns" onclick="event.stopPropagation()">
                            <button class="btn-ghost" onclick="openEditModal('${p.id}')">编辑</button>
                            <button class="btn-ghost btn-delete" onclick="handleDelete('${p.id}')">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderCards() {
            cardView.innerHTML = filteredPlayers.map(p => `
                <div class="player-card" onclick="showDetails('${p.id}')">
                    <div class="card-header">
                        <div class="avatar" style="background: ${posColors[p.position]}">${p.name.charAt(0)}</div>
                        <div class="card-title-group">
                            <div class="player-name">${p.name}</div>
                            <span class="type-tag" style="background: ${posColors[p.position]}">${p.position}</span>
                        </div>
                    </div>
                    <div class="card-grid">
                        <div class="card-item"><div class="card-label">身份证号</div><div>${p.idCard}</div></div>
                        <div class="card-item"><div class="card-label">单位</div><div>${p.unit}</div></div>
                        <div class="card-item"><div class="card-label">民族</div><div>${p.ethnicity}</div></div>
                        <div class="card-item"><div class="card-label">出生地</div><div>${p.birthplace}</div></div>
                        <div class="card-item"><div class="card-label">年龄</div><div>${p.age}</div></div>
                    </div>
                    <div class="card-actions" onclick="event.stopPropagation()">
                        <button class="btn-ghost" onclick="openEditModal('${p.id}')">编辑</button>
                        <button class="btn-ghost btn-delete" onclick="handleDelete('${p.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function handleFilter() {
            const searchText = searchInput.value.toLowerCase();
            const type = typeFilter.value;

            filteredPlayers = playersData.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(searchText) ||
                    p.idCard.includes(searchText) ||
                    p.unit.toLowerCase().includes(searchText);
                const matchType = type === 'all' || p.position === type;
                return matchSearch && matchType;
            });

            render();
        }

        function updateStats() {
            totalCountHeader.textContent = playersData.length;
            statTotal.textContent = playersData.length;

            // 平均年龄
            const sumAge = playersData.reduce((acc, p) => acc + p.age, 0);
            avgAge.textContent = (sumAge / playersData.length).toFixed(1);

            // 位置分布
            const distribution = {};
            playersData.forEach(p => {
                distribution[p.position] = (distribution[p.position] || 0) + 1;
            });

            posDistribution.innerHTML = Object.entries(distribution).map(([pos, count]) => `
                <div class="pos-dot-item">
                    <div class="dot" style="background: ${posColors[pos]}"></div>
                    <span>${pos} ${count}</span>
                </div>
            `).join('');
        }

        function switchView() {
            const tableContainer = document.getElementById('tableView');
            const cardContainer = document.getElementById('cardView');

            if (currentView === 'table') {
                tableContainer.style.display = 'block';
                cardContainer.style.display = 'none';
            } else {
                tableContainer.style.display = 'none';
                cardContainer.style.display = 'flex';
            }
        }

        function showDetails(id) {
            const player = playersData.find(p => p.id === id);
            if (!player) return;

            // 填充模态框
            document.getElementById('m-name').textContent = player.name;
            document.getElementById('m-type').textContent = player.position;
            document.getElementById('m-id').textContent = player.idCard;
            document.getElementById('m-unit').textContent = player.unit;
            document.getElementById('m-ethnicity').textContent = player.ethnicity;
            document.getElementById('m-birth').textContent = player.birthplace;
            document.getElementById('m-age').textContent = player.age;

            document.getElementById('m-height').textContent = player.height;
            document.getElementById('m-weight').textContent = player.weight;
            document.getElementById('m-shoe').textContent = player.shoeSize;
            document.getElementById('m-cloth').textContent = player.clothSize;

            document.getElementById('m-father').textContent = player.family.father;
            document.getElementById('m-mother').textContent = player.family.mother;
            document.getElementById('m-marital').textContent = player.family.maritalStatus;
            document.getElementById('m-passport').textContent = player.certificates.passportNo;
            document.getElementById('m-passport-exp').textContent = player.certificates.expiryDate;

            modal.classList.add('active');
        }

        // --- CRUD 功能实现 ---

        function openAddModal() {
            const modal = document.getElementById('formModalOverlay');
            if (modal) {
                document.getElementById('formModalTitle').textContent = '新增球员';
                document.getElementById('playerForm').reset();
                document.getElementById('f-id').value = '';
                modal.classList.add('active');
            } else {
                console.error('formModalOverlay not found');
            }
        }

        function openEditModal(id) {
            const player = playersData.find(p => p.id === id);
            if (!player) return;

            document.getElementById('formModalTitle').textContent = '编辑球员';
            document.getElementById('f-id').value = player.id;
            document.getElementById('f-name').value = player.name;
            document.getElementById('f-type').value = player.position;
            document.getElementById('f-idCard').value = player.idCard;
            document.getElementById('f-unit').value = player.unit;
            document.getElementById('f-ethnicity').value = player.ethnicity;
            document.getElementById('f-birth').value = player.birthplace;
            document.getElementById('f-age').value = player.age;
            document.getElementById('f-height').value = player.height;
            document.getElementById('f-weight').value = player.weight;
            document.getElementById('f-shoe').value = player.shoeSize;
            document.getElementById('f-cloth').value = player.clothSize;
            document.getElementById('f-father').value = player.family.father;
            document.getElementById('f-mother').value = player.family.mother;
            document.getElementById('f-marital').value = player.family.maritalStatus;
            document.getElementById('f-passport').value = player.certificates.passportNo;
            document.getElementById('f-passport-exp').value = player.certificates.expiryDate;

            document.getElementById('formModalOverlay').classList.add('active');
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('f-id').value;

            const playerData = {
                id: id || Date.now().toString(),
                name: document.getElementById('f-name').value,
                position: document.getElementById('f-type').value,
                idCard: document.getElementById('f-idCard').value,
                unit: document.getElementById('f-unit').value,
                ethnicity: document.getElementById('f-ethnicity').value,
                birthplace: document.getElementById('f-birth').value,
                age: parseInt(document.getElementById('f-age').value),
                trend: 'stable',
                height: parseInt(document.getElementById('f-height').value),
                weight: parseInt(document.getElementById('f-weight').value),
                shoeSize: parseInt(document.getElementById('f-shoe').value),
                clothSize: document.getElementById('f-cloth').value,
                family: {
                    father: document.getElementById('f-father').value,
                    mother: document.getElementById('f-mother').value,
                    maritalStatus: document.getElementById('f-marital').value
                },
                certificates: {
                    passportNo: document.getElementById('f-passport').value,
                    expiryDate: document.getElementById('f-passport-exp').value
                }
            };

            if (id) {
                // 编辑
                const index = playersData.findIndex(p => p.id === id);
                if (index !== -1) playersData[index] = playerData;
            } else {
                // 新增
                playersData.push(playerData);
            }

            document.getElementById('formModalOverlay').classList.remove('active');
            updateStats();
            handleFilter(); // 刷新渲染并应用当前过滤
        }

        function handleDelete(id) {
            if (confirm('确定要删除该球员吗？此操作不可撤销。')) {
                const index = playersData.findIndex(p => p.id === id);
                if (index !== -1) {
                    playersData.splice(index, 1);
                    updateStats();
                    handleFilter();
                }
            }
        }

        // 6. 辅助函数
        function getTrendSymbol(trend) {
            if (trend === 'up') return '↑';
            if (trend === 'down') return '↓';
            return '→';
        }

        function getTrendClass(trend) {
            if (trend === 'up') return 'trend-up';
            if (trend === 'down') return 'trend-down';
            return 'trend-stable';
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
        // 7. 导出全局函数供 inline onclick 使用
        window.openAddModal = openAddModal;
        window.openEditModal = openEditModal;
        window.handleDelete = handleDelete;
        window.showDetails = showDetails;
    </script>
